        body {

        .fade-in {

        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        #main-content {

        }
        .content-blur {
            filter: blur(20px);

        }

        #modal {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #modal.active {
            display: flex;
            opacity: 1;
        }

            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(15px, 20px); }
            100% { transform: translate(0, 0); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        /* Animasi Rotasi untuk Dashed Circle */
        @keyframes rotate-dashed {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: rotate-dashed 12s linear infinite;

            { id: 48, url: 'https://lh3.googleusercontent.com/d/1zjekYqH8ecpuUgxWdl3KSbUMANAJlB-K', videoUrl: 'https://drive.google.com/file/d/1zjekYqH8ecpuUgxWdl3KSbUMANAJlB-K/preview', category: 'video', title: 'Company Ads #48', desc: 'Ubah teks ini sesuka Anda.' },
            { id: 49, url: 'https://lh3.googleusercontent.com/d/11XkhhUcXN5bLTdnbZ-FOFOT4sNtjzSb7', category: 'educational', title: 'Poster educational #49', desc: 'Ubah teks ini sesuka Anda.' },
            { id: 50, url: 'https://picsum.photos/seed/p50/720/1280', category: 'promotional', title: 'Final Project #50', desc: 'Ini adalah item terakhir dari 50 konten.' }
        ];

        // Fungsi merender galeri
        function renderGallery(filter = 'all') {
            const gallery = document.getElementById('gallery-grid');
            gallery.innerHTML = ''; 
            myImages.forEach((item) => {
                if (filter !== 'all' && item.category !== filter) return;
                const isVideo = !!item.videoUrl;
                const card = document.createElement('div');
                card.className = `masonry-item group relative rounded-[1.5rem] md:rounded-[2rem] overflow-hidden bg-gray-200 cursor-pointer shadow-sm hover:shadow-2xl transition-all duration-500 fade-in`;
                card.onclick = () => openModal(item);
                card.innerHTML = `
                    <div class="relative overflow-hidden bg-gray-900">
                        <img src="${item.url}" alt="${item.title}" class="w-full h-auto block transition-transform duration-700 group-hover:scale-110 opacity-90 group-hover:opacity-100" loading="lazy" />
                        ${isVideo ? `<div class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover:bg-transparent transition-colors duration-500"><div class="w-14 h-14 bg-white/20 backdrop-blur-xl rounded-full flex items-center justify-center border border-white/40 text-white shadow-2xl transform transition-transform duration-500 group-hover:scale-110"><i class="fa-solid fa-play text-xl ml-1"></i></div></div>` : ''}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-end p-6">
                             <div class="text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
                                <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-purple-300 mb-1">${item.category}</p>
                                <h4 class="text-lg font-bold leading-tight">${item.title}</h4>
                             </div>
                        </div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // Fungsi filter
        function filterGallery(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-category') === category) btn.classList.add('active');
            });
            const grid = document.getElementById('gallery-grid');
            grid.style.opacity = '0';
            setTimeout(() => {
                renderGallery(category);
                grid.style.opacity = '1';
            }, 300);
        }

        // Fungsi modal
        function openModal(project) {
            const modal = document.getElementById('modal');
            const mediaContainer = document.getElementById('modal-media-container');
            mediaContainer.innerHTML = '';

            if (project.videoUrl) {
                const iframe = document.createElement('iframe');
                iframe.src = project.videoUrl;
                iframe.className = "max-w-[90vw] max-h-[85vh] h-auto w-auto aspect-auto";
                iframe.style.width = project.videoUrl.includes('preview') ? "min(500px, 85vw)" : "min(1280px, 90vw)";
                iframe.style.aspectRatio = project.videoUrl.includes('preview') ? "9/16" : "16/9";
                
                iframe.setAttribute("allowfullscreen", "true");
                iframe.setAttribute("webkitallowfullscreen", "true");
                iframe.setAttribute("mozallowfullscreen", "true");
                iframe.setAttribute("allow", "autoplay; fullscreen; picture-in-picture");
                
                mediaContainer.appendChild(iframe);
            } else {
                const img = document.createElement('img');
                img.src = project.url;
                img.className = "max-w-[90vw] max-h-[85vh] h-auto w-auto object-contain";
                mediaContainer.appendChild(img);
            }

            document.getElementById('modal-title').innerText = project.title;
            document.getElementById('modal-desc').innerText = project.desc;
            modal.classList.add('active');
            document.getElementById('main-content').classList.add('content-blur');
            document.body.style.overflow = 'hidden'; 
            setTimeout(() => {
                document.getElementById('modal-content').classList.remove('scale-95', 'opacity-0');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            document.getElementById('modal-content').classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.remove('active');
                document.getElementById('main-content').classList.remove('content-blur');
                document.body.style.overflow = 'auto'; 
                document.getElementById('modal-media-container').innerHTML = '';
            }, 300);
        }

        function syncRoundFavicon() {
            const profileImg = document.getElementById('profile-img');
            const favicon = document.getElementById('favicon');
            if (profileImg && favicon) {
                const tempImg = new Image();
                tempImg.crossOrigin = "anonymous"; 
                tempImg.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = canvas.height = 64;
                    ctx.beginPath();
                    ctx.arc(32, 32, 32, 0, Math.PI * 2);
                    ctx.clip();
                    ctx.drawImage(tempImg, 0, 0, 64, 64);
                    favicon.href = canvas.toDataURL('image/png');
                };
                tempImg.src = profileImg.src;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderGallery('all');
            syncRoundFavicon();
        });
    </script>
</body>
</html>
