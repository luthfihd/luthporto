<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luth's Porto</title>
    <!-- Favicon Otomatis -->
    <link id="favicon" rel="icon" type="image/x-icon">
    <!-- Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons untuk ikon sosial media -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        background: '#fbfbfe', 
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.background');
        }
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        #main-content {
            transition: filter 0.4s ease, transform 0.4s ease;
        }
        .content-blur {
            filter: blur(20px); 
            transform: scale(0.98);
            pointer-events: none;
        }

        #modal {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #modal.active {
            display: flex;
            opacity: 1;
        }
        
        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(15px, 20px); }
            100% { transform: translate(0, 0); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .filter-btn.active {
            background-color: #8b5cf6 !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3);
            border-color: #8b5cf6 !important;
        }

        /* Masonry Layout */
        .masonry-container {
            column-gap: 1.5rem;
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body class="text-gray-900 antialiased overflow-x-hidden selection:bg-purple-300 selection:text-purple-900">

    <!-- Efek Latar Belakang -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none -z-10">
        <div class="absolute top-[10%] left-[20%] w-[40vw] h-[40vw] bg-indigo-200/40 rounded-full blur-[100px] animate-float"></div>
        <div class="absolute top-[20%] right-[10%] w-[35vw] h-[35vw] bg-pink-100/50 rounded-full blur-[100px] animate-float" style="animation-delay: -3s;"></div>
        <div class="absolute top-[40%] left-[30%] w-[30vw] h-[30vw] bg-purple-100/40 rounded-full blur-[100px] animate-float" style="animation-delay: -1s;"></div>
    </div>

    <div id="main-content">
        <header class="min-h-[90vh] flex flex-col justify-center items-center text-center px-6 pt-24 pb-12">
            <div class="fade-in max-w-4xl mx-auto flex flex-col items-center relative">
                <div class="absolute -z-10 w-full h-full bg-white/30 backdrop-blur-md rounded-[3rem] border border-white/40 shadow-sm opacity-50"></div>
                <div class="mt-12 mb-10 relative">
                    <div class="absolute inset-0 bg-indigo-500/20 blur-2xl rounded-full scale-150"></div>
                    <div class="relative w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-4 border-white shadow-xl">
                        <img id="profile-img" src="https://picsum.photos/seed/luthfi/400/400" alt="Luthfi Hidayat" class="w-full h-full object-cover">
                    </div>
                </div>
                <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter leading-[1.1] mb-10 pb-2 text-transparent bg-clip-text bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500">
                    ready to enhance your design?
                </h1>
                <div class="bg-white/20 backdrop-blur-sm p-6 md:p-8 rounded-[2rem] border border-white/40 shadow-sm mb-12">
                    <p class="text-xl md:text-2xl text-gray-600 font-light leading-relaxed max-w-2xl mx-auto">
                        Halo, saya <span class="font-semibold text-gray-800">Luthfi Hidayat</span>. 
                        Seorang Spesialis Multimedia yang berfokus pada <span class="text-purple-600 font-medium">Promosi dan Edukasi</span>. 
                    </p>
                </div>
            </div>
        </header>

        <main class="py-20 px-4 md:px-8 max-w-[1800px] mx-auto fade-in">
            <div class="text-center mb-12">
                <h2 class="text-4xl md:text-5xl font-bold text-gray-900 tracking-tight mb-8">Significant Projects</h2>
                <div class="flex flex-wrap justify-center gap-3 md:gap-4 mb-12" id="filter-container">
                    <button onclick="filterGallery('semua')" data-category="semua" class="filter-btn active px-6 py-2.5 rounded-full text-sm font-medium transition-all duration-300 border border-gray-200 hover:border-purple-300 bg-white shadow-sm">Semua</button>
                    <button onclick="filterGallery('promosi')" data-category="promosi" class="filter-btn px-6 py-2.5 rounded-full text-sm font-medium transition-all duration-300 border border-gray-200 hover:border-purple-300 bg-white shadow-sm">Promosi</button>
                    <button onclick="filterGallery('edukasi')" data-category="edukasi" class="filter-btn px-6 py-2.5 rounded-full text-sm font-medium transition-all duration-300 border border-gray-200 hover:border-purple-300 bg-white shadow-sm">Edukasi</button>
                    <button onclick="filterGallery('motion')" data-category="motion" class="filter-btn px-6 py-2.5 rounded-full text-sm font-medium transition-all duration-300 border border-gray-200 hover:border-purple-300 bg-white shadow-sm">Motion Graphics</button>
                    <button onclick="filterGallery('branding')" data-category="branding" class="filter-btn px-6 py-2.5 rounded-full text-sm font-medium transition-all duration-300 border border-gray-200 hover:border-purple-300 bg-white shadow-sm">Branding</button>
                </div>
            </div>

            <div id="gallery-grid" class="masonry-container columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-6 transition-all duration-500">
                <!-- Konten dibuat melalui JS -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="py-20 px-6 mt-10 border-t border-gray-100 bg-white/30 backdrop-blur-sm">
            <div class="max-w-6xl mx-auto flex flex-col items-center text-center">
                <!-- Motto -->
                <p class="text-2xl md:text-4xl font-bold tracking-tighter mb-12 text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-600">
                    "berkarya untuk melihat dunia."
                </p>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-12 w-full max-w-4xl pt-8">
                    <!-- Kontak -->
                    <div class="flex flex-col items-center md:items-start text-center md:text-left">
                        <h4 class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-4">Hubungi Saya</h4>
                        <a href="mailto:halo@luthfihidayat.com" class="text-xl md:text-2xl font-medium text-gray-800 hover:text-purple-600 transition-colors">halo@luthfihidayat.com</a>
                        <p class="text-gray-500 mt-2">+62 812-3456-7890</p>
                    </div>

                    <!-- Sosial Media (Hanya X dan Instagram) -->
                    <div class="flex flex-col items-center md:items-end text-center md:text-right">
                        <h4 class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-4">Temukan Saya</h4>
                        <div class="flex gap-4">
                            <!-- Link X -->
                            <a href="https://x.com" target="_blank" class="p-3 rounded-2xl bg-white border border-gray-100 text-gray-600 hover:text-white hover:bg-black hover:border-black shadow-sm transition-all duration-300" title="X (Twitter)">
                                <i data-lucide="twitter"></i>
                            </a>
                            <!-- Link Instagram -->
                            <a href="https://www.instagram.com/makanbuahbanyak/" target="_blank" class="p-3 rounded-2xl bg-white border border-gray-100 text-gray-600 hover:text-white hover:bg-purple-500 hover:border-purple-500 shadow-sm transition-all duration-300" title="Instagram">
                                <i data-lucide="instagram"></i>
                            </a>
                        </div>
                    </div>
                </div>

                <div class="mt-20 pt-8 border-t border-gray-100 w-full text-gray-400 text-sm">
                    <p>&copy; 2026 Luthfi Hidayat. All rights reserved.</p>
                </div>
            </div>
        </footer>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-8 bg-black/60 backdrop-blur-xl" onclick="closeModal()">
        <button onclick="closeModal()" class="close-btn absolute top-6 right-6 z-[110] text-white p-3 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        <div class="relative w-full max-w-5xl flex flex-col items-center justify-center rounded-[2rem] md:rounded-[3rem] overflow-hidden shadow-2xl scale-95 opacity-0 transition-all duration-500 ease-out bg-black" id="modal-content" onclick="event.stopPropagation()">
            <div id="modal-media-container" class="w-full flex justify-center items-center">
                <!-- Konten diisi via JS -->
            </div>
            <div class="w-full bg-gradient-to-t from-black/90 via-black/60 to-transparent p-8 pt-20 text-white absolute bottom-0">
                <h3 id="modal-title" class="text-3xl md:text-4xl font-bold mb-3 tracking-tight"></h3>
                <p id="modal-desc" class="text-base md:text-lg text-gray-200 font-light"></p>
            </div>
        </div>
    </div>

    <script>
        /**
         * TIPS UNTUK VIDEO GOOGLE DRIVE:
         * Gunakan format link: https://drive.google.com/file/d/[FILE_ID]/preview
         * Untuk thumbnail, pastikan properti 'url' berisi link gambar preview yang kamu inginkan.
         */
        const myImages = [
            { 
                url: 'https://picsum.photos/seed/p1/720/1280', // Gambar ini jadi thumbnail di galeri
                videoUrl: 'https://drive.google.com/file/d/1EXslDByK9XYy5cd1KXoZ2tqa773OgGv5/preview', 
                category: 'motion', 
                title: 'Work Highlights', 
                desc: 'Deskripsi karya video portrait kamu.' 
            },
            { 
                url: 'https://picsum.photos/seed/p2/1280/720', 
                category: 'branding', 
                title: 'Landscape Branding Design', 
                desc: 'Deskripsi karya branding landscape kamu.' 
            },
            { 
                url: 'https://lh3.googleusercontent.com/d/1jkLbUA9ENzlOCrmIo6__zexMv-RF9ODS', 
                category: 'promosi', 
                title: 'Social Media Ad', 
                desc: 'Deskripsi karya promosi square kamu.' 
            },
            { 
                url: 'https://lh3.googleusercontent.com/d/11XkhhUcXN5bLTdnbZ-FOFOT4sNtjzSb7', 
                category: 'edukasi', 
                title: 'Poster Edukasi', 
                desc: 'Deskripsi karya edukasi portrait kamu.' 
            },
        ];

        function renderGallery(filter = 'semua') {
            const gallery = document.getElementById('gallery-grid');
            gallery.innerHTML = ''; 
            
            myImages.forEach((item) => {
                if (filter !== 'semua' && item.category !== filter) return;

                const isVideo = !!item.videoUrl;
                const card = document.createElement('div');
                card.className = `masonry-item group relative rounded-[1.5rem] md:rounded-[2rem] overflow-hidden bg-gray-200 cursor-pointer shadow-sm hover:shadow-2xl transition-all duration-500 fade-in`;
                
                card.onclick = () => openModal(isVideo ? item.videoUrl : item.url, item.title, item.desc, isVideo);

                // LOGIKA: Properti 'url' akan selalu menjadi sumber gambar thumbnail di galeri
                card.innerHTML = `
                    <div class="relative overflow-hidden bg-gray-900">
                        <img src="${item.url}" alt="${item.title}" class="w-full h-auto block transition-transform duration-700 group-hover:scale-110 opacity-90 group-hover:opacity-100" loading="lazy" />
                        
                        ${isVideo ? `
                            <div class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover:bg-transparent transition-colors duration-500">
                                <div class="w-14 h-14 bg-white/20 backdrop-blur-xl rounded-full flex items-center justify-center border border-white/40 text-white shadow-2xl transform transition-transform duration-500 group-hover:scale-110">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" class="ml-1"><path d="m7 4 12 8-12 8V4z"/></svg>
                                </div>
                            </div>
                        ` : ''}
                        
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-end p-6">
                             <div class="text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
                                <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-purple-300 mb-1">${item.category}</p>
                                <h4 class="text-lg font-bold leading-tight">${item.title}</h4>
                             </div>
                        </div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        function filterGallery(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-category') === category) btn.classList.add('active');
            });
            const grid = document.getElementById('gallery-grid');
            grid.style.opacity = '0';
            setTimeout(() => {
                renderGallery(category);
                grid.style.opacity = '1';
            }, 300);
        }

        function openModal(mediaUrl, title, desc, isVideo = false) {
            const modal = document.getElementById('modal');
            const mediaContainer = document.getElementById('modal-media-container');
            mediaContainer.innerHTML = '';

            if (isVideo) {
                const iframe = document.createElement('iframe');
                iframe.src = mediaUrl;
                // Mengatur aspek rasio video di dalam modal agar lebih fleksibel
                iframe.className = "w-full aspect-[9/16] md:max-h-[85vh] md:w-auto md:aspect-auto"; 
                iframe.style.minWidth = "320px";
                iframe.style.height = "80vh";
                iframe.allow = "autoplay";
                mediaContainer.appendChild(iframe);
            } else {
                const img = document.createElement('img');
                img.src = mediaUrl;
                img.className = "max-w-full max-h-[85vh] object-contain";
                mediaContainer.appendChild(img);
            }

            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            modal.classList.add('active');
            document.getElementById('main-content').classList.add('content-blur');
            document.body.style.overflow = 'hidden'; 
            setTimeout(() => {
                document.getElementById('modal-content').classList.remove('scale-95', 'opacity-0');
                document.getElementById('modal-content').classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
            document.getElementById('modal-content').classList.replace('opacity-100', 'opacity-0');
            setTimeout(() => {
                modal.classList.remove('active');
                document.getElementById('main-content').classList.remove('content-blur');
                document.body.style.overflow = 'auto'; 
                document.getElementById('modal-media-container').innerHTML = '';
            }, 300);
        }

        // Fungsi untuk sinkronisasi favicon dengan foto profil
        function syncFavicon() {
            const profileImg = document.getElementById('profile-img');
            const favicon = document.getElementById('favicon');
            if (profileImg && favicon) {
                favicon.href = profileImg.src;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderGallery('semua');
            syncFavicon(); // Jalankan saat halaman dimuat
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
