<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luth's Portfolio</title>
    <!-- Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts untuk tipografi yang clean dan modern -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        background: '#fbfbfe', 
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.background');
        }
        /* Animasi fade-in sederhana saat halaman dimuat */
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Blur transisi untuk konten utama */
        #main-content {
            transition: filter 0.4s ease, transform 0.4s ease;
        }
        .content-blur {
            filter: blur(15px);
            transform: scale(0.98);
            pointer-events: none;
        }

        /* Modal styling */
        #modal {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        #modal.active {
            display: flex;
            opacity: 1;
        }
    </style>
</head>
<body class="text-gray-900 antialiased overflow-x-hidden selection:bg-purple-300 selection:text-purple-900">

    <!-- Wrapper untuk konten utama yang akan di-blur -->
    <div id="main-content">
        <!-- Header & Hero Section -->
        <header class="min-h-[85vh] flex flex-col justify-center items-center text-center px-6 pt-24 pb-12">
            <div class="fade-in max-w-4xl mx-auto flex flex-col items-center" style="animation-delay: 0.1s;">
                
                <!-- Foto Profil -->
                <div class="mb-10 relative">
                    <div class="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-4 border-white shadow-xl bg-gradient-to-tr from-indigo-100 to-purple-100">
                        <!-- Ganti URL ini dengan foto profil asli Anda -->
                        <img src="https://lh3.googleusercontent.com/d/1jkLbUA9ENzlOCrmIo6__zexMv-RF9ODS" alt="Luthfi Hidayat" class="w-full h-full object-cover">
                    </div>
                    <!-- Aksen dekoratif melingkar -->
                    <div class="absolute -inset-2 border border-dashed border-purple-300 rounded-full animate-[spin_10s_linear_infinite]"></div>
                </div>

                <!-- Memperbaiki leading agar teks tidak terpotong dan menambah margin-bottom -->
                <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter leading-[1.1] mb-10 pb-2 text-transparent bg-clip-text bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500">
                    Luthfi Hidayat
                </h1>
                
                <p class="text-xl md:text-2xl text-gray-600 font-light leading-relaxed max-w-2xl mx-auto"> 
                    Spesialis Multimedia yang berfokus pada konten <span class="text-purple-600 font-medium">Promosi dan Edukasi.</span> 
                        <span class="font-regular text-gray-800">Menghasilkan 100+ konten yang berdampak</span>. 
                </p>
            </div>
        </header>

        <!-- Gallery Section -->
        <main class="py-20 px-4 md:px-8 max-w-[1800px] mx-auto fade-in" style="animation-delay: 0.4s;">
            <div class="text-center mb-16">
                <h2 class="text-4xl md:text-5xl font-bold text-gray-900 tracking-tight">Significant projects</h2>
            </div>

            <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">
                <!-- Item galeri di-generate via JS -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="py-24 text-center mt-10">
            <p class="text-3xl md:text-9xl font-bold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-gray-300 to-gray-500">
                #berkarya untuk melihat dunia
            </p>
        </footer>
    </div>

    <!-- Fullscreen Modal Overlay -->
    <div id="modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-6 bg-white/20 backdrop-blur-md" onclick="closeModal()">
        <div class="max-w-6xl w-full flex flex-col md:flex-row items-center gap-6 md:gap-10 bg-white/90 p-6 md:p-12 rounded-[2.5rem] md:rounded-[3rem] shadow-2xl border border-white/40 scale-95 transition-all duration-500 ease-out overflow-y-auto max-h-[90vh]" id="modal-content" onclick="event.stopPropagation()">
            <!-- Gambar di Modal -->
            <div class="w-full md:w-3/5 overflow-hidden rounded-[1.5rem] md:rounded-[2rem] shadow-lg flex items-center justify-center bg-gray-50">
                <img id="modal-img" src="" alt="" class="max-w-full max-h-[60vh] object-contain">
            </div>
            <!-- Teks di Modal -->
            <div class="w-full md:w-2/5 space-y-4 md:space-y-6">
                <div class="flex justify-between items-start">
                    <h3 id="modal-title" class="text-3xl md:text-5xl font-bold text-gray-900 leading-tight"></h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-black transition-colors p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
                <p id="modal-desc" class="text-base md:text-xl text-gray-600 leading-relaxed font-light"></p>
                <div class="pt-4">
                    <button onclick="closeModal()" class="w-full md:w-auto bg-black text-white px-8 py-4 rounded-full font-medium hover:bg-gray-800 transition-all active:scale-95">
                        Kembali
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const myImages = [
            <!-- Foto 01 -->
            { url: 'https://lh3.googleusercontent.com/d/11XkhhUcXN5bLTdnbZ-FOFOT4sNtjzSb7', title: 'Desktop Wallpaper', desc: 'Teks dan visual yang kuat menimbulkan kesadaran, walaupun hanya satu persen.' },
            <!-- Foto 02 -->
            { url: 'https://lh3.googleusercontent.com/d/1cse3qsSU-4W1d0jgdFNfKFwqMksQ7Jcv', title: 'Desktop Wallpaper', desc: 'Teks dan visual yang kuat menimbulkan kesadaran, walaupun hanya satu persen.' },
            <!-- Foto 03 -->
            { url: 'https://lh3.googleusercontent.com/d/11XkhhUcXN5bLTdnbZ-FOFOT4sNtjzSb7', title: 'Desktop Wallpaper', desc: 'Teks dan visual yang kuat menimbulkan kesadaran, walaupun hanya satu persen.' },
            <!-- Foto 04 -->
            { url: 'https://lh3.googleusercontent.com/d/1cse3qsSU-4W1d0jgdFNfKFwqMksQ7Jcv', title: 'Desktop Wallpaper', desc: 'Teks dan visual yang kuat menimbulkan kesadaran, walaupun hanya satu persen.' },
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const gallery = document.getElementById('gallery-grid');
            const totalItems = 40; 
            
            for (let i = 1; i <= totalItems; i++) {
                const customData = myImages[i-1] || {};
                const title = customData.title || `Project Vol. ${i}`;
                const desc = customData.desc || `Eksplorasi visual kreatif yang menggabungkan elemen desain modern dengan fungsionalitas tingkat tinggi untuk hasil yang memukau.`;
                
                let aspectClass, imgWidth, imgHeight;

                if (i <= 20) {
                    aspectClass = "aspect-video"; 
                    imgWidth = 1280; imgHeight = 720;
                } else {
                    aspectClass = "aspect-[9/16]";
                    imgWidth = 720; imgHeight = 1280;
                }

                const imgUrl = customData.url || `https://picsum.photos/seed/${i * 31}/${imgWidth}/${imgHeight}`; 

                const card = document.createElement('div');
                card.className = `group relative ${aspectClass} rounded-[2rem] md:rounded-[2.5rem] overflow-hidden bg-gray-200 cursor-pointer shadow-sm hover:shadow-2xl transition-all duration-500 transform hover:-translate-y-2 fade-in`;
                card.style.animationDelay = `${(i % 8) * 0.1}s`;
                
                card.onclick = () => openModal(imgUrl, title, desc);

                card.innerHTML = `
                    <img src="${imgUrl}" alt="${title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy" />
                    <div class="absolute inset-0 bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
                        <div class="bg-white/20 backdrop-blur-md border border-white/30 text-white text-xs md:text-sm font-medium px-5 py-2.5 rounded-full transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
                            Lihat Detail
                        </div>
                    </div>
                `;
                
                gallery.appendChild(card);
            }
        });

        function openModal(img, title, desc) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('main-content');
            const modalInner = document.getElementById('modal-content');
            const modalImg = document.getElementById('modal-img');
            
            modalImg.src = img;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;

            modal.classList.add('active');
            content.classList.add('content-blur');
            document.body.style.overflow = 'hidden'; 

            setTimeout(() => {
                modalInner.classList.remove('scale-95', 'opacity-0');
                modalInner.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const content = document.getElementById('main-content');
            const modalInner = document.getElementById('modal-content');

            modalInner.classList.remove('scale-100', 'opacity-100');
            modalInner.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.remove('active');
                content.classList.remove('content-blur');
                document.body.style.overflow = 'auto'; 
            }, 300);
        }
    </script>
</body>
</html>
