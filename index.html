<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luth's Porto - Cloud Edition</title>
    <link id="favicon" rel="icon" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { background: '#fbfbfe' }
                }
            }
        }
    </script>
    <style>
        body { background-color: theme('colors.background'); transition: background 0.5s; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; opacity: 0; transform: translateY(15px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        #main-content { transition: filter 0.4s ease, transform 0.4s ease; }
        .content-blur { filter: blur(20px); transform: scale(0.98); pointer-events: none; }
        #modal { display: none; opacity: 0; transition: opacity 0.4s ease; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 1rem; background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); }
        #modal.active { display: flex; opacity: 1; }
        .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); padding: 0.75rem; border-radius: 9999px; color: white; cursor: pointer; z-index: 110; }
        @keyframes float { 0% { transform: translate(0, 0); } 50% { transform: translate(15px, 20px); } 100% { transform: translate(0, 0); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes rotate-dashed { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: rotate-dashed 12s linear infinite; }
        .filter-btn { transition: all 0.3s ease; }
        .filter-btn.active { background-color: #8b5cf6 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3); border-color: #8b5cf6 !important; }
        .masonry-container { column-gap: 1.5rem; }
        .masonry-item { break-inside: avoid; margin-bottom: 1.5rem; }
        .loading-spinner { border: 3px solid rgba(139, 92, 246, 0.1); border-top: 3px solid #8b5cf6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-900 antialiased overflow-x-hidden">

    <!-- Latar Belakang Dekoratif -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none -z-10">
        <div class="absolute top-[10%] left-[20%] w-[40vw] h-[40vw] bg-indigo-200/40 rounded-full blur-[100px] animate-float"></div>
        <div class="absolute top-[20%] right-[10%] w-[35vw] h-[35vw] bg-pink-100/50 rounded-full blur-[100px] animate-float" style="animation-delay: -3s;"></div>
    </div>

    <div id="main-content">
        <header class="min-h-[70vh] flex flex-col justify-center items-center text-center px-6 pt-24 pb-12">
            <div class="fade-in max-w-4xl mx-auto flex flex-col items-center relative">
                <!-- Status Admin -->
                <div id="admin-badge" class="hidden mb-4 bg-purple-100 text-purple-700 px-4 py-1 rounded-full text-xs font-bold border border-purple-200">
                    <i class="fa-solid fa-user-shield mr-2"></i> Mode Admin Aktif
                </div>

                <div class="mb-10 relative flex items-center justify-center">
                    <div class="absolute inset-0 bg-indigo-500/20 blur-3xl rounded-full scale-150"></div>
                    <svg class="absolute w-44 h-44 md:w-52 md:h-52 animate-spin-slow" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="48" fill="none" stroke="url(#gradient-dashed)" stroke-width="1.5" stroke-dasharray="8 6"></circle>
                        <defs><linearGradient id="gradient-dashed"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#ec4899"/></linearGradient></defs>
                    </svg>
                    <div class="relative w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-4 border-white shadow-xl z-10">
                        <img id="profile-img" src="https://lh3.googleusercontent.com/d/1jkLbUA9ENzlOCrmIo6__zexMv-RF9ODS" class="w-full h-full object-cover" alt="Profile">
                    </div>
                </div>
                <h1 class="text-6xl md:text-9xl font-extrabold tracking-tighter mb-10 text-transparent bg-clip-text bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500">Lut.hfi</h1>
                <div class="bg-white/20 backdrop-blur-sm p-6 md:p-8 rounded-[2rem] border border-white/40 shadow-sm">
                    <p class="text-xl md:text-2xl text-gray-600 font-light">Karya permanen yang tersimpan di Cloud Database.</p>
                </div>
            </div>
        </header>

        <!-- Panel Input Cloud (Hanya muncul jika login/diaktifkan) -->
        <section id="admin-panel" class="max-w-xl mx-auto px-6 mb-20 fade-in">
            <div class="bg-white/60 backdrop-blur-md p-8 rounded-[2.5rem] border border-white shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-bold italic">Simpan ke Database</h3>
                    <div id="save-status" class="hidden text-xs text-green-600 font-bold"><i class="fa-solid fa-check mr-1"></i> Tersimpan</div>
                </div>
                
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="new-title" placeholder="Nama Karya" class="p-4 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-purple-400 outline-none bg-white/50">
                        <select id="new-category" class="p-4 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-purple-400 outline-none bg-white/50">
                            <option value="promosi">Promosi</option>
                            <option value="edukasi">Edukasi</option>
                            <option value="motion">Motion</option>
                            <option value="branding">Branding</option>
                        </select>
                    </div>
                    <textarea id="new-desc" placeholder="Detail deskripsi karya..." class="w-full p-4 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-purple-400 outline-none h-24 bg-white/50"></textarea>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-extrabold text-gray-400 mb-2 ml-1 tracking-widest">URL GAMBAR (SAMPUL)</label>
                            <input type="text" id="new-url" placeholder="Link Gambar (https://...)" class="w-full p-3 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-purple-400 outline-none text-sm bg-white/50">
                        </div>
                        <div>
                            <label class="block text-[10px] font-extrabold text-gray-400 mb-2 ml-1 tracking-widest">URL VIDEO (OPSIONAL)</label>
                            <input type="text" id="new-video" placeholder="Link Video G-Drive/YouTube" class="w-full p-3 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-purple-400 outline-none text-sm bg-white/50">
                        </div>
                    </div>

                    <button id="submit-btn" class="group relative w-full bg-gray-900 text-white font-bold py-4 rounded-2xl overflow-hidden transition-all active:scale-95 shadow-lg">
                        <div id="btn-content" class="relative z-10 flex items-center justify-center">
                            <i class="fa-solid fa-cloud-arrow-up mr-2 transition-transform group-hover:-translate-y-1"></i>
                            <span>Publikasikan Karya</span>
                        </div>
                        <div class="absolute inset-0 bg-gradient-to-r from-indigo-600 to-purple-600 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </button>
                </div>
            </div>
        </section>

        <main class="py-10 px-4 md:px-8 max-w-[1800px] mx-auto fade-in">
            <div class="text-center mb-16">
                <h2 class="text-5xl md:text-8xl font-bold mb-8 tracking-tighter text-gray-800">Cloud Projects</h2>
                <div class="flex flex-wrap justify-center gap-3" id="filter-container">
                    <button onclick="filterGallery('semua')" data-category="semua" class="filter-btn active px-8 py-2.5 rounded-full border bg-white shadow-sm font-medium">Semua</button>
                    <button onclick="filterGallery('promosi')" data-category="promosi" class="filter-btn px-8 py-2.5 rounded-full border bg-white shadow-sm font-medium">Promosi</button>
                    <button onclick="filterGallery('edukasi')" data-category="edukasi" class="filter-btn px-8 py-2.5 rounded-full border bg-white shadow-sm font-medium">Edukasi</button>
                    <button onclick="filterGallery('motion')" data-category="motion" class="filter-btn px-8 py-2.5 rounded-full border bg-white shadow-sm font-medium">Motion</button>
                    <button onclick="filterGallery('branding')" data-category="branding" class="filter-btn px-8 py-2.5 rounded-full border bg-white shadow-sm font-medium">Branding</button>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loader" class="flex flex-col items-center justify-center py-20">
                <div class="loading-spinner mb-4"></div>
                <p class="text-gray-400 text-sm animate-pulse">Menghubungkan ke database...</p>
            </div>

            <div id="gallery-grid" class="masonry-container columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-6 transition-all duration-500"></div>
            
            <div id="empty-state" class="hidden text-center py-20 opacity-40">
                <i class="fa-solid fa-folder-open text-6xl mb-4"></i>
                <p class="text-xl">Belum ada karya di database.</p>
            </div>
        </main>
    </div>

    <!-- Modal Detail -->
    <div id="modal" onclick="closeModal()">
        <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark text-2xl"></i></button>
        <div id="modal-content" class="relative w-full max-w-fit flex flex-col items-center bg-black rounded-[3rem] overflow-hidden scale-90 opacity-0 transition-all duration-500 shadow-2xl" onclick="event.stopPropagation()">
            <div id="modal-media-container" class="flex justify-center items-center bg-zinc-900"></div>
            <div class="w-full bg-gradient-to-t from-black/95 via-black/60 to-transparent p-10 text-white absolute bottom-0 pointer-events-none">
                <h3 id="modal-title" class="text-3xl md:text-5xl font-bold mb-3 tracking-tight"></h3>
                <p id="modal-desc" class="text-gray-300 text-base md:text-xl font-light max-w-2xl"></p>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase functions
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, timestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Konfigurasi Firebase (Disediakan oleh lingkungan)
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'portfolio-app';

        let projects = [];
        let currentFilter = 'semua';

        // 1. Inisialisasi Auth (WAJIB)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
            }
        };

        // 2. Listener untuk Data Real-time
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('admin-badge').classList.remove('hidden');
                
                // Ambil data dari koleksi publik (Rule 1)
                const projectsRef = collection(db, 'artifacts', appId, 'public', 'data', 'projects');
                
                // Gunakan onSnapshot untuk update otomatis (Rule 2: Tanpa query kompleks)
                onSnapshot(projectsRef, (snapshot) => {
                    projects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // Sembunyikan loader
                    document.getElementById('loader').classList.add('hidden');
                    
                    if (projects.length === 0) {
                        document.getElementById('empty-state').classList.remove('hidden');
                    } else {
                        document.getElementById('empty-state').classList.add('hidden');
                    }
                    
                    renderGallery(currentFilter);
                }, (error) => {
                    console.error("Firestore Error:", error);
                    alert("Gagal mengambil data. Pastikan konfigurasi benar.");
                });
            }
        });

        // 3. Fungsi Tambah Project ke Firestore
        async function addNewProject() {
            const user = auth.currentUser;
            if (!user) return;

            const title = document.getElementById('new-title').value;
            const desc = document.getElementById('new-desc').value;
            const cat = document.getElementById('new-category').value;
            const url = document.getElementById('new-url').value;
            const videoUrl = document.getElementById('new-video').value;

            if (!title || !url) {
                alert("Minimal isi Judul dan Link Gambar!");
                return;
            }

            const btn = document.getElementById('submit-btn');
            const btnText = btn.querySelector('span');
            btn.disabled = true;
            btnText.innerText = "Memproses...";

            try {
                const projectsRef = collection(db, 'artifacts', appId, 'public', 'data', 'projects');
                await addDoc(projectsRef, {
                    title,
                    desc,
                    category: cat,
                    url,
                    videoUrl: videoUrl || null,
                    createdAt: new Date().toISOString(),
                    owner: user.uid
                });

                // Reset Form
                document.getElementById('new-title').value = '';
                document.getElementById('new-desc').value = '';
                document.getElementById('new-url').value = '';
                document.getElementById('new-video').value = '';
                
                // Feedback Sukses
                const status = document.getElementById('save-status');
                status.classList.remove('hidden');
                setTimeout(() => status.classList.add('hidden'), 3000);

            } catch (error) {
                console.error("Add Error:", error);
                alert("Gagal menyimpan ke cloud.");
            } finally {
                btn.disabled = false;
                btnText.innerText = "Publikasikan Karya";
            }
        }

        // 4. Render UI
        window.renderGallery = (filter = 'semua') => {
            currentFilter = filter;
            const gallery = document.getElementById('gallery-grid');
            gallery.innerHTML = ''; 
            
            projects.forEach((item) => {
                if (filter !== 'semua' && item.category !== filter) return;
                
                const card = document.createElement('div');
                card.className = `masonry-item group relative rounded-[2rem] overflow-hidden bg-zinc-100 cursor-pointer shadow-sm hover:shadow-2xl transition-all duration-700 fade-in`;
                card.onclick = () => openModal(item);
                
                card.innerHTML = `
                    <div class="relative overflow-hidden aspect-auto">
                        <img src="${item.url}" class="w-full h-auto transition-transform duration-1000 group-hover:scale-105" loading="lazy" />
                        ${item.videoUrl ? `<div class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover:bg-black/0 transition-colors"><div class="w-16 h-16 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center border border-white/30"><i class="fa-solid fa-play text-white text-xl"></i></div></div>` : ''}
                        
                        <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 p-8 flex flex-col justify-end">
                            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-purple-400 mb-2">${item.category}</p>
                            <h4 class="text-xl font-bold text-white mb-2">${item.title}</h4>
                            <div class="flex items-center text-xs text-gray-400 font-light">
                                <i class="fa-solid fa-expand mr-2"></i> Lihat Detail
                            </div>
                        </div>
                        
                        <!-- Tombol Hapus (Hanya untuk pemilik) -->
                        <button onclick="event.stopPropagation(); deleteProject('${item.id}')" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-white opacity-0 group-hover:opacity-100 transition-all hover:bg-red-500/80">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    </div>`;
                gallery.appendChild(card);
            });
        };

        window.deleteProject = async (id) => {
            if (!confirm("Hapus karya ini secara permanen dari Cloud?")) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'projects', id);
                await deleteDoc(docRef);
            } catch (err) {
                alert("Gagal menghapus.");
            }
        };

        window.filterGallery = (cat) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.category === cat));
            renderGallery(cat);
        };

        window.openModal = (p) => {
            const mc = document.getElementById('modal-media-container');
            mc.innerHTML = p.videoUrl 
                ? `<iframe src="${p.videoUrl}" class="w-[90vw] max-w-[500px] aspect-[9/16] border-0" allow="autoplay"></iframe>` 
                : `<img src="${p.url}" class="max-h-[80vh] max-w-[90vw] object-contain rounded-xl">`;
            
            document.getElementById('modal-title').innerText = p.title;
            document.getElementById('modal-desc').innerText = p.desc || 'Karya multimedia kreatif.';
            document.getElementById('modal').classList.add('active');
            document.getElementById('main-content').classList.add('content-blur');
            document.body.style.overflow = 'hidden';
            setTimeout(() => document.getElementById('modal-content').classList.remove('scale-90', 'opacity-0'), 50);
        };

        window.closeModal = () => {
            document.getElementById('modal-content').classList.add('scale-90', 'opacity-0');
            setTimeout(() => {
                document.getElementById('modal').classList.remove('active');
                document.getElementById('main-content').classList.remove('content-blur');
                document.body.style.overflow = 'auto';
                document.getElementById('modal-media-container').innerHTML = '';
            }, 300);
        };

        // Event Listeners
        document.getElementById('submit-btn').addEventListener('click', addNewProject);

        // Start
        initAuth();
    </script>
</body>
</html>
